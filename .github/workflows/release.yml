name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" \
            SpaceCraft_Korean_Patch_Setup.exe \
            --title "SpaceCraft Korean Patch ${TAG_NAME#v}" \
            --notes-file release-notes.md \
            --latest \
            --verify-tag
